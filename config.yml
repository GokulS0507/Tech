backend:
  name: git-gateway
  branch: main

# Simplified storage for your flat structure
media_folder: "images"
public_folder: "images"

collections:
  - name: "data"
    label: "Website Content"
    delete: false
    editor:
      preview: false
    files:
      - name: "products"
        label: "Product List"
        file: "products.json"
        fields:
          - label: "Products"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string", hint: "e.g. earbuds, smartwatch" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Amazon Link", name: "amazon", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

      - name: "navigation"
        label: "Category Menu"
        file: "navigation.json"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Section Name", name: "name", widget: "string" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
