backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "navigation"
        label: "Category Dropdown Management"
        file: "navigation.json"
        fields:
          - label: "Menu Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Section Name", name: "name", widget: "string", hint: "e.g. Fashion, Audio, Sports" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "URL / Anchor", name: "url", widget: "string", hint: "e.g. #earbuds or amazon.in/search..." }

  - name: "data"
    label: "Website Content"
    delete: false
    editor:
      preview: false
    files:
      - name: "products"
        label: "Product List"
        file: "products.json"
        fields:
          - label: "Products"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category ID", name: "category", widget: "string", hint: "e.g. earbuds, smartwatch (must match section IDs)" }
              - { label: "Price Text", name: "price", widget: "string", hint: "e.g. ₹1,299" }
              - { label: "Product Image", name: "image", widget: "image" }
              - { label: "Amazon Affiliate Link", name: "amazon", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
